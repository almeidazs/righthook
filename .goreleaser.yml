version: 2

project_name: righthook

before:
    hooks:
        - go mod tidy

builds:
    - id: righthook
      main: ./cmd/righthook
      binary: righthook
      env:
          - CGO_ENABLED=0
      goos:
          - linux
          - darwin
          - windows
      goarch:
          - amd64
          - arm64
      ignore:
          - goos: windows
            goarch: arm64

archives:
    - id: righthook
      builds:
          - righthook
      name_template: >-
          righthook-
          {{- .Os }}-
          {{- if eq .Arch "amd64" }}amd64
          {{- else if eq .Arch "arm64" }}arm64
          {{- else }}{{ .Arch }}{{ end }}
      format_overrides:
          - goos: windows
            formats:
                - zip
      files:
          - README.md
          - LICENSE*

checksum:
    name_template: "checksums.txt"

snapshot:
    version_template: "{{ incpatch .Version }}-next"

changelog:
    sort: asc
    filters:
        exclude:
            - "^docs:"
            - "^test:"
            - "^chore:"
