on:
  push:
    branches:
      - main
  pull_request:

name: Lint
jobs:
  revive:
    name: revive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.0"
      - name: Install revive
        run: go install github.com/mgechev/revive@v1.15.0
      - name: Run revive
        run: revive -config revive.toml -formatter stylish ./...
